name: to_do_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png

flutter_native_splash:
  color: "#0F172A"
  image: assets/logo.png
  android_12:
    color: "#0F172A"
    image: assets/logo.png
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/app_icon.png