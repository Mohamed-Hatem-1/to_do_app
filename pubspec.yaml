name: to_do_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png

flutter_native_splash:
  color: "#0F172A"
  background_image: assets/splash.png
  android_12:
    background_image: assets/splash.png
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo.png
    - assets/splash.png
    - assets/app_icon.png
    - assets/images/